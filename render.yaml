databases:
  - name: elp-db
    databaseName: elp
    user: elp
    plan: free

services:
  - type: web
    name: elp-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://client-sanjaarbeks-projects.vercel.app
      - key: PORT
        value: 10000
